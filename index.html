<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lugas Base App</title>

<meta name="base:app_id" content="69d6bf380b55e7382276f4ee">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0d1117,#020617);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:500px;
background:#161b22;
padding:30px;
border-radius:24px;
border:1px solid #30363d;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

h1{
font-size:32px;
margin-bottom:10px;
text-align:center;
}

.subtitle{
text-align:center;
color:#8b949e;
margin-bottom:25px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-weight:bold;
font-size:15px;
cursor:pointer;
transition:.25s;
}

.wallet-btn{
background:#1d9bf0;
color:white;
margin-bottom:15px;
}

.wallet-btn:hover{
background:#1583cc;
}

.post-btn{
background:#22c55e;
color:white;
margin-top:10px;
}

.post-btn:hover{
background:#16a34a;
}

input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:14px;
background:#21262d;
color:white;
font-size:15px;
margin-bottom:10px;
}

.board{
margin-top:25px;
}

.message{
background:#21262d;
padding:15px;
border-radius:14px;
margin-bottom:10px;
border-left:4px solid #1d9bf0;
animation:fadeIn .3s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>
<body>

<div class="container">

<h1>Base Confession</h1>

<p class="subtitle">
Anonymous Web3 Message Board
</p>

<button class="wallet-btn" onclick="connectWallet()">
Connect Wallet
</button>

<input
id="messageInput"
placeholder="What's on your mind?"
>

<button class="post-btn" onclick="postMessage()">
Post Message
</button>

<div class="board" id="board"></div>

</div>

<script>
let userAccount = null;

function loadMessages(){

const messages =
JSON.parse(
localStorage.getItem("messages")
) || [];

const board =
document.getElementById("board");

board.innerHTML="";

[...messages].reverse().forEach(msg=>{

const div =
document.createElement("div");

div.className="message";

div.innerText=msg;

board.appendChild(div);

});

}

async function connectWallet(){

try{

if(!window.ethereum){

alert("Wallet not detected.");
return;

}

const accounts =
await window.ethereum.request({
method:"eth_requestAccounts"
});

userAccount = accounts[0];

document.querySelector(".wallet-btn")
.innerText =
"Connected: " +
userAccount.slice(0,6) +
"..." +
userAccount.slice(-4);

}catch(err){

console.error(err);

alert("Wallet connection failed.");

}

}

function postMessage(){

if(!userAccount){

alert("Connect wallet first.");
return;

}

const input =
document.getElementById("messageInput");

if(!input.value.trim()) return;

let messages =
JSON.parse(
localStorage.getItem("messages")
) || [];

messages.push(input.value);

localStorage.setItem(
"messages",
JSON.stringify(messages)
);

input.value="";

loadMessages();

}

window.onload = loadMessages;
</script>

</body>
</html>
