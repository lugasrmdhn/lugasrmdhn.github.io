<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="base:app_id" content="69d6bf380b55e7382276f4ee">

  <title>My Base App</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:linear-gradient(135deg,#0f172a,#020617);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    .container{
      width:420px;
      background:#111827;
      padding:30px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.5);
      text-align:center;
      border:1px solid #1f2937;
    }

    h1{
      margin-bottom:10px;
      font-size:30px;
    }

    p{
      color:#94a3b8;
      margin-bottom:20px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      margin-top:10px;
      font-size:15px;
      font-weight:bold;
      cursor:pointer;
      transition:.2s;
    }

    .connect-btn{
      background:#2563eb;
      color:white;
    }

    .connect-btn:hover{
      background:#1d4ed8;
    }

    .send-btn{
      background:#22c55e;
      color:white;
    }

    .send-btn:hover{
      background:#16a34a;
    }

    #walletText{
      margin-top:20px;
      font-size:14px;
      color:#cbd5e1;
      word-break:break-all;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>My Base App</h1>
  <p>Connect wallet & send test transaction</p>

  <button class="connect-btn" onclick="connectWallet()">
    Connect Wallet
  </button>

  <button class="send-btn" onclick="sendTx()">
    Send 0.00001 ETH
  </button>

  <div id="walletText">
    Wallet not connected
  </div>
</div>

<script>
let userAccount = null;

async function connectWallet() {
  try {
    if (!window.ethereum) {
      alert("MetaMask not found");
      return;
    }

    const accounts = await window.ethereum.request({
      method: 'eth_requestAccounts'
    });

    userAccount = accounts[0];

    document.getElementById("walletText").innerText =
      "Connected: " + userAccount;

  } catch (err) {
    console.error(err);
    alert("Failed connect wallet");
  }
}

async function sendTx() {
  if (!userAccount) {
    alert("Connect wallet first");
    return;
  }

  try {
    const ethAmount = 0.00001;

    const wei =
      BigInt(Math.floor(ethAmount * 1e18));

    await window.ethereum.request({
      method: 'eth_sendTransaction',
      params: [{
        from: userAccount,
        to: userAccount,
        value: '0x' + wei.toString(16)
      }]
    });

    alert("Transaction sent!");

  } catch (err) {
    console.error(err);
    alert("Transaction failed");
  }
}
</script>

</body>
</html>
