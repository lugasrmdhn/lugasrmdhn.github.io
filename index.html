<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="base:app_id" content="69d6bf380b55e7382276f4ee">

<title>Base Builder App</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#020617;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
width:420px;
padding:30px;
border-radius:20px;
background:#0f172a;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,.4);
}

h1{
margin-bottom:10px;
}

p{
color:#94a3b8;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.connect{
background:#2563eb;
color:white;
}

.send{
background:#14b8a6;
color:white;
}

#wallet{
margin-top:20px;
font-size:14px;
word-break:break-all;
}
</style>
</head>
<body>

<div class="container">

<h1>Base Builder App</h1>
<p>ERC-8021 Builder Code Integrated</p>

<button class="connect" id="connectBtn">
Connect Wallet
</button>

<button class="send" id="sendBtn">
Send Builder TX
</button>

<div id="wallet">
Wallet not connected
</div>

</div>

<!-- ETHERS MODERN -->
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>

<script>
let provider;
let signer;
let userAddress;

/*
============================
BASE BUILDER CONFIG
============================
*/

const BUILDER_CODE = "bc_qflzf7nl";


/*
ERC-8021 ENCODER
*/
function encodeBuilderCode(code){

const codeHex = Array.from(code)
.map(char=>char.charCodeAt(0).toString(16).padStart(2,"0"))
.join("");

const lengthHex = code.length.toString(16).padStart(2,"0");

const schema = "00";

const marker = "80218021802180218021802180218021";

return "0x" + codeHex + lengthHex + schema + marker;

}

const DATA_SUFFIX = encodeBuilderCode(BUILDER_CODE);


/*
CONNECT WALLET
*/
async function connectWallet(){

if(!window.ethereum){
alert("Install MetaMask");
return;
}

provider = new ethers.BrowserProvider(window.ethereum);

await provider.send("eth_requestAccounts",[]);

signer = await provider.getSigner();

userAddress = await signer.getAddress();

document.getElementById("wallet").innerText =
"Connected: " + userAddress;

}


/*
SEND TX
*/
async function sendTransaction(){

if(!signer){
alert("Connect wallet first");
return;
}

try{

const tx = await signer.sendTransaction({

to:userAddress,

value:ethers.parseEther("0.00001"),

data:DATA_SUFFIX

});

await tx.wait();

alert("Builder TX Sent!");

console.log("TX HASH:",tx.hash);

}
catch(err){

console.error(err);

alert("Failed / Wallet may reject ERC-8021");

}

}


/*
BUTTON EVENTS
*/
document
.getElementById("connectBtn")
.addEventListener("click",connectWallet);

document
.getElementById("sendBtn")
.addEventListener("click",sendTransaction);

</script>

</body>
</html>
