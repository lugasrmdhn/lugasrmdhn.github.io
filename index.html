<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="base:app_id" content="69d6bf380b55e7382276f4ee">

  <title>My Base App</title>

  <style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:
    radial-gradient(circle at top left,#2563eb33,transparent 30%),
    radial-gradient(circle at bottom right,#7c3aed33,transparent 30%),
    linear-gradient(135deg,#0f172a,#020617);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  overflow:hidden;
}

.container{
  width:420px;
  padding:32px;
  border-radius:24px;
  background:rgba(17,24,39,0.75);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:
    0 0 30px rgba(37,99,235,0.15),
    0 20px 40px rgba(0,0,0,0.45);
  text-align:center;
}

h1{
  font-size:32px;
  font-weight:700;
  margin-bottom:10px;
  background:linear-gradient(90deg,#60a5fa,#a78bfa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

p{
  color:#94a3b8;
  margin-bottom:25px;
}

button{
  width:100%;
  padding:15px;
  margin-top:12px;
  border:none;
  border-radius:14px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:all .25s ease;
}

.connect-btn{
  background:linear-gradient(90deg,#2563eb,#3b82f6);
  color:white;
  box-shadow:0 8px 20px rgba(37,99,235,0.35);
}

.connect-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 24px rgba(37,99,235,0.5);
}

.send-btn{
  background:linear-gradient(90deg,#22c55e,#16a34a);
  color:white;
  box-shadow:0 8px 20px rgba(34,197,94,0.35);
}

.send-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 24px rgba(34,197,94,0.5);
}

#walletText{
  margin-top:20px;
  font-size:14px;
  color:#cbd5e1;
  background:#1e293b;
  padding:12px;
  border-radius:12px;
  word-break:break-all;
  border:1px solid rgba(255,255,255,0.05);
}
</style>
</head>
<body>

<div class="container">
  <h1>My Base App</h1>
  <p>Connect wallet & send test transaction</p>

  <button class="connect-btn" onclick="connectWallet()">
    Connect Wallet
  </button>

  <button class="send-btn" onclick="sendTx()">
    Send 0.00001 ETH
  </button>

  <div id="walletText">
    Wallet not connected
  </div>
</div>

<script>
let userAccount = null;

async function connectWallet() {
  try {
    if (!window.ethereum) {
      alert("MetaMask not found");
      return;
    }

    const accounts = await window.ethereum.request({
      method: 'eth_requestAccounts'
    });

    userAccount = accounts[0];

    document.getElementById("walletText").innerText =
      "Connected: " + userAccount;

  } catch (err) {
    console.error(err);
    alert("Failed connect wallet");
  }
}

async function sendTx() {
  if (!userAccount) {
    alert("Connect wallet first");
    return;
  }

  try {
    const ethAmount = 0.00001;

    const wei =
      BigInt(Math.floor(ethAmount * 1e18));

    await window.ethereum.request({
      method: 'eth_sendTransaction',
      params: [{
        from: userAccount,
        to: userAccount,
        value: '0x' + wei.toString(16)
      }]
    });

    alert("Transaction sent!");

  } catch (err) {
    console.error(err);
    alert("Transaction failed");
  }
}
</script>

</body>
</html>
