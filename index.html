<!DOCTYPE html>
<html>
<head>
  <title>My Base App</title>
  <meta name="base:app_id" content="69d6bf380b55e7382276f4ee">

  <style>
    body{
      background:#0f172a;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      margin:0;
    }

    .box{
      background:#111827;
      padding:30px;
      border-radius:20px;
      width:400px;
      text-align:center;
    }

    button{
      width:100%;
      padding:15px;
      margin-top:10px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    .connect{
      background:#2563eb;
      color:white;
    }

    .send{
      background:#22c55e;
      color:white;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>My Base App</h1>

  <button class="connect" onclick="connectWallet()">
    Connect Wallet
  </button>

  <button class="send" onclick="sendTx()">
    Send Transaction
  </button>

  <p id="walletText">Not Connected</p>
</div>

<script>
let userAccount = null;

async function connectWallet() {
  try {
    const accounts = await window.ethereum.request({
      method: 'eth_requestAccounts'
    });

    userAccount = accounts[0];

    document.getElementById("walletText").innerText =
      "Connected: " + userAccount;

  } catch (err) {
    console.error(err);
    alert("Failed connect wallet");
  }
}

async function sendTx() {
  if (!userAccount) {
    alert("Connect wallet first");
    return;
  }

  try {
    await window.ethereum.request({
      method: 'eth_sendTransaction',
      params: [{
        from: userAccount,
        to: userAccount,
        value: '0x2386F26FC1000'
      }]
    });

    alert("Transaction sent!");

  } catch (err) {
    console.error(err);
    alert("Transaction failed");
  }
}
</script>

</body>
</html>
