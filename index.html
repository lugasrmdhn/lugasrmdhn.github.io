<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="base:app_id" content="69d6bf380b55e7382276f4ee">

<title>My Base App</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    radial-gradient(circle at 20% 20%, #3b82f655 0%, transparent 25%),
    radial-gradient(circle at 80% 80%, #8b5cf655 0%, transparent 25%),
    radial-gradient(circle at 50% 50%, #06b6d455 0%, transparent 35%),
    #020617;
  overflow:hidden;
  color:white;
}

.container{
  width:430px;
  padding:35px;
  border-radius:28px;
  background:rgba(15,23,42,0.75);
  backdrop-filter:blur(25px);
  border:1px solid rgba(255,255,255,0.08);
  text-align:center;
}

button{
  width:100%;
  padding:16px;
  margin-top:14px;
  border:none;
  border-radius:16px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
}

.connect-btn{
  background:linear-gradient(90deg,#2563eb,#7c3aed);
  color:white;
}

.send-btn{
  background:linear-gradient(90deg,#06b6d4,#14b8a6);
  color:white;
}

#walletText{
  margin-top:22px;
  padding:14px;
  border-radius:14px;
  background:rgba(255,255,255,0.03);
  word-break:break-all;
}
</style>
</head>
<body>

<div class="container">
  <h1>My Base App</h1>
  <p>Connect wallet & send tracked transaction</p>

  <button class="connect-btn" onclick="connectWallet()">
    Connect Wallet
  </button>

  <button class="send-btn" onclick="sendTx()">
    Send 0.00001 ETH
  </button>

  <div id="walletText">
    Wallet not connected
  </div>
</div>

<script>
let userAccount = null;

/*
BUILDER CODE LU
*/
const BUILDER_CODE = "bc_qflzf7nl";


/*
ENCODE BUILDER CODE → ERC8021 FORMAT
*/
function generateSuffix(code){
    const hex = Array.from(code)
      .map(c=>c.charCodeAt(0).toString(16).padStart(2,"0"))
      .join("");

    const len = code.length.toString(16).padStart(2,"0");

    return "0x" + hex + len + "00" + "80218021802180218021802180218021";
}

const builderSuffix = generateSuffix(BUILDER_CODE);


async function connectWallet() {
  try {
    if (!window.ethereum) {
      alert("MetaMask not found");
      return;
    }

    const accounts = await window.ethereum.request({
      method:'eth_requestAccounts'
    });

    userAccount = accounts[0];

    document.getElementById("walletText").innerText =
      "Connected: " + userAccount;

  } catch(err){
    console.error(err);
  }
}


async function sendTx() {
  if (!userAccount){
    alert("Connect wallet first");
    return;
  }

  try {

    const ethAmount = 0.00001;

    const wei =
      BigInt(Math.floor(ethAmount * 1e18));

    const txParams = {
      from:userAccount,
      to:userAccount,
      value:'0x'+wei.toString(16),

      /*
      BUILDER ATTRIBUTION
      */
      data:builderSuffix
    };

    const txHash = await window.ethereum.request({
      method:'eth_sendTransaction',
      params:[txParams]
    });

    alert("Tracked TX Sent!\n"+txHash);

    console.log("Builder suffix:",builderSuffix);

  } catch(err){
    console.error(err);
    alert("Transaction failed");
  }
}
</script>

</body>
</html>
