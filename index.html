<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="base:app_id" content="69d6bf380b55e7382276f4ee">

  <title>Lugas Base App</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:linear-gradient(135deg,#0f172a,#020617);
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:500px;
      background:#111827;
      border:1px solid #1f2937;
      border-radius:24px;
      padding:32px;
      box-shadow:0 20px 40px rgba(0,0,0,0.45);
    }

    h1{
      font-size:32px;
      text-align:center;
      margin-bottom:10px;
    }

    .subtitle{
      text-align:center;
      color:#94a3b8;
      margin-bottom:25px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:14px;
      font-size:15px;
      font-weight:bold;
      cursor:pointer;
      transition:0.25s;
    }

    .wallet-btn{
      background:#2563eb;
      color:white;
      margin-bottom:15px;
    }

    .wallet-btn:hover{
      background:#1d4ed8;
    }

    .send-btn{
      background:#22c55e;
      color:white;
    }

    .send-btn:hover{
      background:#16a34a;
    }

    .status{
      margin-top:15px;
      text-align:center;
      color:#94a3b8;
      font-size:14px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Base Wallet App</h1>
    <p class="subtitle">Connect MetaMask on Base Network</p>

    <button class="wallet-btn" onclick="connectWallet()">
      Connect Wallet
    </button>

    <button class="send-btn" onclick="sendTx()">
      Send Transaction
    </button>

    <p class="status" id="status">
      Wallet not connected
    </p>
  </div>

  <script>
    let userAccount = null;

    async function connectWallet() {
      if (window.ethereum) {
        try {
          const accounts = await window.ethereum.request({
            method: 'eth_requestAccounts'
          });

          userAccount = accounts[0];

          document.getElementById("status").innerText =
            "Connected: " +
            userAccount.slice(0,6) +
            "..." +
            userAccount.slice(-4);

        } catch (err) {
          console.error(err);
          alert("Connection failed.");
        }

      } else {
        alert("MetaMask not detected.");
      }
    }

    async function sendTx() {
      if (!userAccount) {
        alert("Connect wallet first.");
        return;
      }

      try {
        await window.ethereum.request({
          method: 'eth_sendTransaction',
          params: [{
            from: userAccount,
            to: userAccount,
            value: '0x38D7EA4C68000'
          }]
        });

        alert("Transaction sent!");

      } catch (err) {
        console.error(err);
        alert("Transaction failed.");
      }
    }
  </script>

</body>
</html>
