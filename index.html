<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="base:app_id" content="69d6bf380b55e7382276f4ee">

<title>My Base App</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    radial-gradient(circle at 20% 20%, #3b82f655 0%, transparent 25%),
    radial-gradient(circle at 80% 80%, #8b5cf655 0%, transparent 25%),
    radial-gradient(circle at 50% 50%, #06b6d455 0%, transparent 35%),
    #020617;
  overflow:hidden;
  color:white;
}

.container{
  width:430px;
  padding:35px;
  border-radius:28px;
  background:rgba(15,23,42,0.75);
  backdrop-filter:blur(25px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:
    0 0 50px rgba(59,130,246,0.15),
    0 0 100px rgba(139,92,246,0.08);
  text-align:center;
}

h1{
  font-size:36px;
  font-weight:800;
  margin-bottom:12px;
  background:linear-gradient(90deg,#60a5fa,#c084fc,#22d3ee);
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

p{
  color:#94a3b8;
  margin-bottom:28px;
  font-size:15px;
}

button{
  width:100%;
  padding:16px;
  margin-top:14px;
  border:none;
  border-radius:16px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:.3s;
}

.connect-btn{
  background:linear-gradient(90deg,#2563eb,#7c3aed);
  color:white;
}

.send-btn{
  background:linear-gradient(90deg,#06b6d4,#14b8a6);
  color:white;
}

#walletText{
  margin-top:22px;
  padding:14px;
  border-radius:14px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.05);
  font-size:13px;
  color:#cbd5e1;
  word-break:break-all;
}
</style>
</head>
<body>

<div class="container">
  <h1>My Base App</h1>
  <p>Connect wallet & send tracked transaction</p>

  <button class="connect-btn" onclick="connectWallet()">
    Connect Wallet
  </button>

  <button class="send-btn" onclick="sendTx()">
    Send 0.00001 ETH
  </button>

  <div id="walletText">
    Wallet not connected
  </div>
</div>

<script>
let userAccount = null;

/*
=================================
BUILDER CODE LU
=================================
*/
const BUILDER_CODE = "bc_qflzf7nl";


/*
=================================
ENCODE BUILDER CODE KE ERC8021
=================================
*/
function generateSuffix(code) {

  const hexCode = Array.from(code)
    .map(c => c.charCodeAt(0).toString(16).padStart(2,"0"))
    .join("");

  const lengthHex = code.length
    .toString(16)
    .padStart(2,"0");

  return (
    "0x" +
    hexCode +
    lengthHex +
    "00" +
    "80218021802180218021802180218021"
  );
}

const DATA_SUFFIX = generateSuffix(BUILDER_CODE);


/*
=================================
CONNECT WALLET
=================================
*/
async function connectWallet() {

  try {

    if (!window.ethereum) {
      alert("MetaMask not found");
      return;
    }

    const accounts =
      await window.ethereum.request({
        method:'eth_requestAccounts'
      });

    userAccount = accounts[0];

    document.getElementById("walletText").innerText =
      "Connected: " + userAccount;

  }

  catch(err) {

    console.error(err);

    alert(err.message);

  }

}


/*
=================================
SEND TX + BUILDER SUFFIX
=================================
*/
async function sendTx() {

  if (!userAccount) {
    alert("Connect wallet first");
    return;
  }

  try {

    const wei =
      BigInt(10000000000000); // 0.00001 ETH

    const txHash =
      await window.ethereum.request({

        method:'eth_sendTransaction',

        params:[{

          from:userAccount,

          to:userAccount,

          value:'0x'+wei.toString(16),

          dataSuffix:DATA_SUFFIX

        }]

      });

    alert("Transaction Sent!\n"+txHash);

    console.log("TX HASH:",txHash);
    console.log("DATA SUFFIX:",DATA_SUFFIX);

  }

  catch(err) {

    console.error("FULL ERROR:",err);

    alert(err.message);

  }

}
</script>

</body>
</html>
