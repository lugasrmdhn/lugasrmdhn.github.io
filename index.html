<!DOCTYPE html>
<html>
<head>
  <title>Lugas Base App</title>
  <meta name="base:app_id" content="69d6bf380b55e7382276f4ee">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0d1117;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:500px;
      background:#161b22;
      padding:30px;
      border-radius:20px;
      box-shadow:0 8px 30px rgba(0,0,0,0.4);
      border:1px solid #30363d;
    }

    h1{
      font-size:28px;
      margin-bottom:20px;
      text-align:center;
    }

    button{
      background:#1d9bf0;
      border:none;
      color:white;
      padding:12px 18px;
      border-radius:12px;
      cursor:pointer;
      font-weight:bold;
      transition:.2s;
    }

    button:hover{
      background:#188cd8;
    }

    input{
      width:100%;
      padding:14px;
      margin:15px 0;
      border:none;
      outline:none;
      border-radius:12px;
      background:#21262d;
      color:white;
      font-size:15px;
    }

    .wallet-btn{
      width:100%;
      margin-bottom:15px;
    }

    .post-btn{
      width:100%;
    }

    .board{
      margin-top:25px;
    }

    .message{
      background:#21262d;
      padding:15px;
      border-radius:12px;
      margin-bottom:10px;
      border-left:4px solid #1d9bf0;
    }

    .subtitle{
      color:#8b949e;
      margin-bottom:20px;
      text-align:center;
      font-size:14px;
    }

  </style>
</head>
<body>

<div class="container">

  <h1>Base Confession</h1>
  <p class="subtitle">Anonymous Web3 Message Board</p>

  <button class="wallet-btn" onclick="connectWallet()">Connect Wallet</button>

  <input id="messageInput" placeholder="What's on your mind?" />

  <button class="post-btn" onclick="postMessage()">Post Message</button>

  <div class="board" id="board"></div>

</div>

<script>
let userAccount = null;

function loadMessages(){
  const messages =
    JSON.parse(localStorage.getItem("messages")) || [];

  const board =
    document.getElementById("board");

  board.innerHTML="";

  messages.reverse().forEach(msg=>{
    const div =
      document.createElement("div");

    div.className="message";
    div.innerText=msg;

    board.appendChild(div);
  });
}

async function connectWallet(){
  if(window.ethereum){

    const accounts =
      await window.ethereum.request({
        method:'eth_requestAccounts'
      });

    userAccount = accounts[0];

    alert("Connected: " + userAccount);

  }else{
    alert("Wallet not found");
  }
}

function postMessage(){

  if(!userAccount){
    alert("Connect wallet first");
    return;
  }

  const input =
    document.getElementById("messageInput");

  if(!input.value) return;

  let messages =
    JSON.parse(localStorage.getItem("messages")) || [];

  messages.push(input.value);

  localStorage.setItem(
    "messages",
    JSON.stringify(messages)
  );

  input.value="";

  loadMessages();
}

loadMessages();
</script>

</body>
</html>
